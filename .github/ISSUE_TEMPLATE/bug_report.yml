name: Bug Report
description: Report a bug or unexpected behaviour.
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour. Include the exact `bento` command you ran.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Bento version
      description: The version or commit hash of Bento.
    validations:
      required: true
  - type: dropdown
    id: run-mode
    attributes:
      label: Run mode
      options:
        - Local dev build (local repos)
        - Fresh / Docker (--fresh)
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: spt-version
    attributes:
      label: SPT version being built
      description: The `--version` / `--tag` you were building (e.g. 4.1.0), if applicable.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >-
        Any relevant output, including the per-stage logs Bento writes to the output `logs/`
        directory. This will be automatically formatted as code.
      render: shell
